<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngepas | Pilihan yang Pas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f6f1;
color:#1f3d2d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:92%;
max-width:420px;
background:white;
padding:30px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
margin:auto;
background:#2f6d45;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:42px;
}

h1{
margin-top:20px;
font-size:34px;
}

p{
margin-top:10px;
line-height:1.7;
color:#666;
}

.btn{
display:block;
text-decoration:none;
margin-top:15px;
padding:16px;
border-radius:14px;
font-weight:bold;
background:#2f6d45;
color:white;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.footer{
margin-top:30px;
font-size:13px;
color:#888;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🏡
</div>

<h1>Ngepas</h1>

<p>

</html>
